spring:
  cloud:
    compatibility-verifier:
      enabled: false
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MariaDB
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  sql:
    init:
      mode: never
  mail:
    host: localhost
    port: 25

server:
  port: 0
