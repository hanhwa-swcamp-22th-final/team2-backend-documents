server:
  port: 8014

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWKS_URI:http://backend-auth:8011/.well-known/jwks.json}
  application:
    name: team2-backend-documents
  cloud:
    compatibility-verifier:
      enabled: false
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=5m
  profiles:
    # 기본값 'dev' 제거 — docker 배포 시 보안 개방 방지. dev 는 로컬 IDE 에서만 명시 활성.
    active: ${SPRING_PROFILES_ACTIVE:}
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: ${JPA_FORMAT_SQL:false}
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        debug: ${MAIL_DEBUG:false}
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          connectiontimeout: ${MAIL_SMTP_CONNECTION_TIMEOUT_MS:5000}
          timeout: ${MAIL_SMTP_TIMEOUT_MS:10000}
          writetimeout: ${MAIL_SMTP_WRITE_TIMEOUT_MS:10000}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}

jwt:
  fallback-public-key-path: ${JWT_FALLBACK_PUBLIC_KEY_PATH:}

master:
  service:
    url: ${MASTER_SERVICE_URL:http://localhost:8012}

auth:
  service:
    url: ${AUTH_SERVICE_URL:http://localhost:8011}

cloud:
  aws:
    s3:
      endpoint: ${S3_ENDPOINT:http://localhost:9000}
      region: ${S3_REGION:ap-northeast-2}
      bucket: ${S3_BUCKET:team2-documents}
      access-key: ${S3_ACCESS_KEY:minioadmin}
      secret-key: ${S3_SECRET_KEY:minioadmin}

activity:
  service:
    url: ${ACTIVITY_SERVICE_URL:http://localhost:8013}

internal:
  api:
    token: ${INTERNAL_API_TOKEN:}

documents:
  mail:
    async:
      core-pool-size: ${DOCUMENT_MAIL_ASYNC_CORE_POOL_SIZE:2}
      max-pool-size: ${DOCUMENT_MAIL_ASYNC_MAX_POOL_SIZE:4}
      queue-capacity: ${DOCUMENT_MAIL_ASYNC_QUEUE_CAPACITY:100}
    outbox:
      poll-size: ${DOCUMENT_MAIL_OUTBOX_POLL_SIZE:10}
      poll-delay-ms: ${DOCUMENT_MAIL_OUTBOX_POLL_DELAY_MS:30000}
      initial-delay-ms: ${DOCUMENT_MAIL_OUTBOX_INITIAL_DELAY_MS:10000}

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000
  circuitbreaker:
    enabled: true

resilience4j:
  circuitbreaker:
    instances:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 20s
        minimumNumberOfCalls: 5

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.team2.documents.command.domain.entity,com.team2.documents.command.domain.entity.enums,com.team2.documents.command.application.dto,com.team2.documents.query.dto

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
