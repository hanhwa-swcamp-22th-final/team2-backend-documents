server:
  port: 8084

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWKS_URI:http://backend-auth:8011/.well-known/jwks.json}
  application:
    name: team2-backend-documents
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}

auth:
  service:
    url: ${AUTH_SERVICE_URL:http://localhost:8011}

cloud:
  aws:
    s3:
      endpoint: ${S3_ENDPOINT:http://localhost:9000}
      region: ${S3_REGION:ap-northeast-2}
      bucket: ${S3_BUCKET:team2-documents}
      access-key: ${S3_ACCESS_KEY:minioadmin}
      secret-key: ${S3_SECRET_KEY:minioadmin}

activity:
  service:
    url: ${ACTIVITY_SERVICE_URL:http://localhost:8083}

currency:
  api:
    enabled: ${CURRENCY_API_ENABLED:true}
    fallback-enabled: ${CURRENCY_API_FALLBACK_ENABLED:true}
    primary-base-url: ${CURRENCY_API_PRIMARY_BASE_URL:https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api}

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.team2.documents.command.domain.entity,com.team2.documents.command.domain.entity.enums,com.team2.documents.command.application.dto,com.team2.documents.query.dto

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
